name: Weekly Review Social Proof Tweet

on:
  schedule:
    # Wednesday and Saturday at 15:00 UTC (11:00 US East)
    - cron: '0 15 * * 3,6'
  workflow_dispatch:

jobs:
  review-tweet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Post Review Quote Tweet
        run: npx tsx scripts/content-gen/post-review-quote.ts
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          EN_TWITTER_API_KEY: ${{ secrets.EN_TWITTER_API_KEY }}
          EN_TWITTER_API_SECRET: ${{ secrets.EN_TWITTER_API_SECRET }}
          EN_TWITTER_ACCESS_TOKEN: ${{ secrets.EN_TWITTER_ACCESS_TOKEN }}
          EN_TWITTER_ACCESS_SECRET: ${{ secrets.EN_TWITTER_ACCESS_SECRET }}
