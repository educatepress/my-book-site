name: System Health & AI Patrol (Daily)

on:
  schedule:
    # Run every day at 00:30 UTC (09:30 JST)
    # 09:00 の自動投稿完了、およびデプロイ完了を確実に見届けるためのマージン
    - cron: '30 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  daily-health-patrol:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run AI Browsing & Health Patrol
        run: npx tsx scripts/patrol/ai-health-patrol.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

