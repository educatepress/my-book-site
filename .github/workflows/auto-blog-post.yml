name: Auto Generate Blog Post

on:
  schedule:
    # Run twice a week: Tuesday and Friday at 00:00 UTC (09:00 JST)
    - cron: '0 0 * * 2,5'
  workflow_dispatch: # Allows manual trigger from GitHub UI / App

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Content with Gemini AI
        run: npm run generate-auto
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Check for New Content
        id: check
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No new content generated. Skipping deploy."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "New content detected!"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push to Main
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(blog): auto-generated blog post [skip ci]"
          git push origin main

      - name: Trigger Vercel Deploy
        if: steps.check.outputs.has_changes == 'true'
        run: |
          echo "✅ Pushed to main. Vercel will auto-deploy within ~30 seconds."
          echo "📝 New blog post has been published!"
