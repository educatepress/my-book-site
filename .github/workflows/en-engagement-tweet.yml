name: EN TTC Engagement Tweet

on:
  schedule:
    # US morning: 14:00 UTC (10:00 US East / 23:00 JST)
    - cron: '0 14 * * *'
    # US evening: 23:00 UTC (19:00 US East / 08:00 JST+1)
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  engagement-tweet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Post Engagement Tweet
        run: npx tsx scripts/content-gen/post-en-engagement.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          EN_TWITTER_API_KEY: ${{ secrets.EN_TWITTER_API_KEY }}
          EN_TWITTER_API_SECRET: ${{ secrets.EN_TWITTER_API_SECRET }}
          EN_TWITTER_ACCESS_TOKEN: ${{ secrets.EN_TWITTER_ACCESS_TOKEN }}
          EN_TWITTER_ACCESS_SECRET: ${{ secrets.EN_TWITTER_ACCESS_SECRET }}
