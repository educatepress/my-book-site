name: X Reply Guard (Auto-delete backlash)

on:
  schedule:
    # Every 4 hours — monitors recent replies for negative reception
    # SUSPENDED (X account banned 2026-05-01) - cron: '0 1,5,9,13,17,21 * * *'
  workflow_dispatch:

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Reply Guard
        run: npx tsx scripts/content-gen/x-reply-guard.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EN_TWITTER_API_KEY: ${{ secrets.EN_TWITTER_API_KEY }}
          EN_TWITTER_API_SECRET: ${{ secrets.EN_TWITTER_API_SECRET }}
          EN_TWITTER_ACCESS_TOKEN: ${{ secrets.EN_TWITTER_ACCESS_TOKEN }}
          EN_TWITTER_ACCESS_SECRET: ${{ secrets.EN_TWITTER_ACCESS_SECRET }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
