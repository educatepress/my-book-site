name: Auto Generate and Post Daily X

on:
  schedule:
    # Run every day at 00:00 UTC (09:00 JST)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI / App

jobs:
  daily-twitter-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate and Post Daily X Content from Queue
        run: npx tsx scripts/content-gen/write-x-from-queue.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          EN_TWITTER_API_KEY: ${{ secrets.EN_TWITTER_API_KEY }}
          EN_TWITTER_API_SECRET: ${{ secrets.EN_TWITTER_API_SECRET }}
          EN_TWITTER_ACCESS_TOKEN: ${{ secrets.EN_TWITTER_ACCESS_TOKEN }}
          EN_TWITTER_ACCESS_SECRET: ${{ secrets.EN_TWITTER_ACCESS_SECRET }}

      - name: Commit Queue Status Update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/content-gen/content-queue.json
          git diff --cached --quiet || git commit -m "chore: update X queue status [skip ci]"
          git push
