    <h1>妊活・不妊治療と向き合うための「心の柱」──アイデンティティ複雑性の考え方</h1>
    <p class="subttl">
      治療が生活の中心になりやすい妊活期間。ときに「自分＝妊活・不妊治療」という状態になり、
      気持ちの浮き沈みが大きくなることがあります。本記事では、
      心理学でいう「アイデンティティ複雑性（自己の柱の多さ）」をわかりやすく解説し、
      治療と並行して “自分を支える複数の柱” を育てる方法を整理します。
    </p>
  </header>
