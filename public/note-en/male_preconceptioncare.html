<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="/logocircle.png" type="image/png">

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Male Preconception Care | Slide Article</title>
  <meta name="description" content="Male preconception care visual slides.">
  <style>
    :root{
      --bg:#FFFBF7;
      --text:#574540;
      --sub:#8C7A75;
      --panel:#FEF6F7;
      --shadow:0 12px 28px rgba(0,0,0,.08);
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:ui-sans-serif,system-ui,"Inter","Noto Sans JP",Roboto,Helvetica,Arial,sans-serif;
      line-height:1.7;
    }
    a{color:inherit;text-decoration:none;}
    .wrap{
      max-width:1000px;
      margin:24px auto 40px;
      padding:16px;
    }
    header{
      margin-bottom:16px;
    }
    h1{
      font-size:clamp(26px,3vw,32px);
      margin:0 0 6px;
      line-height:1.3;
    }
    .sub{
      margin:0;
      color:var(--sub);
      font-size:0.95rem;
    }
    .slides{
      display:flex;
      flex-direction:column;
      gap:18px;
      margin-top:18px;
    }
    figure{
      margin:0;
      background:var(--panel);
      border-radius:18px;
      padding:10px;
      box-shadow:var(--shadow);
      border:1px solid rgba(0,0,0,.04);
    }
    figure img{
      display:block;
      width:100%;
      height:auto;
      border-radius:14px;
    }
    figcaption{
      margin-top:6px;
      font-size:0.85rem;
      color:var(--sub);
      text-align:right;
    }
    .back-link{
      margin-top:22px;
      font-size:0.9rem;
      color:var(--sub);
    }
    .back-link a{
      text-decoration:underline;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Male Preconception Care</h1>
      <p class="sub">Slide series (1–13)</p>
    </header>
