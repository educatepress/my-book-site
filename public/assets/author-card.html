    <p class="author-bio">
      日本生殖医学会認定・生殖医療専門医。不妊治療の臨床と研究に従事し、
      患者教育にも注力。「note」「Instagram」で正確な医療知識をやさしく発信している。<br>
      1986年生まれ。2011年東京慈恵会医科大学卒業、日本赤十字社医療センターで初期研修を経て、
      同大学産婦人科学講座に入局。附属病院にて12年間勤務し、2025年4月より表参道ARTクリニックに入職。<br>
      大学病院では早発卵巣不全（POI）の臨床研究で博士号を取得。
      現在はヘルスケア分野とも連携し、女性の健康に関する正しい情報をわかりやすく届けている。
    </p>
